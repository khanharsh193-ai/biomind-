<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BioMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-top">
        <div class="logo">
          <span class="logo-icon">🧬</span>
          <span class="logo-text">BioMind</span>
        </div>
        <button class="new-chat-btn" onclick="newSession()">+ New Session</button>
      </div>

      <div class="sessions-section">
        <div class="section-label">Sessions</div>
        <div class="sessions-list" id="sessionsList"></div>
      </div>

      <div class="sidebar-bottom">
        <div class="student-card" id="studentCard">
          <div class="student-avatar" id="studentAvatar">?</div>
          <div class="student-details">
            <div class="student-name" id="studentNameDisplay">New Student</div>
            <div class="student-level" id="studentLevelDisplay">Level not set</div>
          </div>
        </div>
      </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <header class="topbar">
        <div class="topbar-left">
          <div class="session-title" id="sessionTitle">Biology Session</div>
          <div class="session-sub">Powered by BioMind</div>
        </div>
        <div class="topbar-right">
          <div class="status-pip"></div>
          <span class="status-text">Ready</span>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <div class="input-box">
          <textarea
            id="userInput"
            class="input-field"
            placeholder="Ask BioMind anything about biology..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
